{{ define "main" }}
  <div class="docs-layout">
    {{ partial "docs-sidebar" . }}

    <article class="docs-content">
      <header class="page-header">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}
          <p>{{ . }}</p>
        {{ end }}
      </header>

      <div class="prose">
        {{ .Content }}
      </div>
    </article>

    {{ partial "page-toc" . }}
  </div>
{{ end }}
